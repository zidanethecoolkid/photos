    document.getElementById('windows').insertAdjacentHTML('beforeend', h);

  preload.onerror = function() {

// Size window to fit image aspect ratio
function fitWindow(imgW, imgH) {
  var chrome = 80; // title bar + back bar + nav bar
  var maxW, maxH;
  if (isMobile()) {
    maxW = window.innerWidth - 8;
    maxH = (window.innerHeight || document.documentElement.clientHeight) - 48 - 10;
  } else {
    maxW = Math.min(800, window.innerWidth - 100);
    maxH = Math.min(700, (window.innerHeight || document.documentElement.clientHeight) - 100);
  }
  var availH = maxH - chrome;
  var ratio = imgW / imgH;
  var w, h;
  if (ratio >= 1) {
    // Landscape or square
    w = maxW;
    h = Math.round(w / ratio) + chrome;
    if (h > maxH) { h = maxH; w = Math.round((h - chrome) * ratio); }
  } else {
    // Portrait
    h = maxH;
    w = Math.round((h - chrome) * ratio);
    if (w > maxW) { w = maxW; h = Math.round(w / ratio) + chrome; }
  }
  w = Math.max(300, w);
  h = Math.max(200, h);
  var x = Math.round((window.innerWidth - w) / 2);
  var y = Math.round(((window.innerHeight || document.documentElement.clientHeight) - 48 - h) / 2);
  if (y < 4) y = 4;
  if (x < 4) x = 4;
  return { w: w, h: h, x: x, y: y };
}
// CROSS-ZIP NAVIGATION — when you reach the end of a zip, continues into the next zip in the group
function navImage(wid, dir) {
  var state = viewerStates[wid]; if (!state) return;
  var group = DESKTOP_GROUPS.find(function(g) { return g.id === state.groupId; });
  if (!group) return;
  var zip = findZip(state.zipId, state.groupId);
  if (!zip) return;
  var newIdx = state.currentIdx + dir;
  if (newIdx >= zip.images.length) {
    var zi = group.children.findIndex(function(z) { return z.id === state.zipId; });
    var ni = zi + 1;
    if (ni >= group.children.length) ni = 0;
    zip = group.children[ni];
    state.zipId = zip.id;
    state.currentIdx = 0;
    newIdx = 0;
  } else if (newIdx < 0) {
    var zi = group.children.findIndex(function(z) { return z.id === state.zipId; });
    var pi = zi - 1;
    if (pi < 0) pi = group.children.length - 1;
    zip = group.children[pi];
    state.zipId = zip.id;
    state.currentIdx = zip.images.length - 1;
    newIdx = zip.images.length - 1;
  } else {
    state.currentIdx = newIdx;
  }
  var img = zip.images[newIdx];
  var vimg = document.getElementById('vimg-' + wid);
  vimg.src = img.url;
  // Resize window to fit new image
  var preload = new Image();
  preload.onload = function() {
    var sz = fitWindow(preload.naturalWidth, preload.naturalHeight);
    var el = document.getElementById(wid);
    if (el) { el.style.width = sz.w+'px'; el.style.height = sz.h+'px'; el.style.left = sz.x+'px'; el.style.top = sz.y+'px'; }
  };
  preload.src = img.url;
  document.getElementById('title-' + wid).textContent = img.name + ' — Image Viewer (' + zip.name + ')';
  document.getElementById('navlabel-' + wid).textContent = (newIdx+1) + ' / ' + zip.images.length + ' [' + zip.name + ']';
  openWindows[wid].name = img.name;
  updateTaskbar();
}
function goBack(currentWid, parentFn, args) { closeWindow(currentWid); window[parentFn].apply(null, args); }
function closeWindow(wid) { var el = document.getElementById(wid); if (el) el.remove(); delete openWindows[wid]; delete viewerStates[wid]; updateTaskbar(); }

document.addEventListener('mouseup', function() { if (!iconDrag || iconDrag.isTouch) return; if (!iconDrag.moved) { var now=Date.now(); var el=document.getElementById(iconDrag.id); if (el && el._lastClick && now-el._lastClick<400) { iconDrag.openFn(); el._lastClick=0; } else if (el) el._lastClick=now; } iconDrag = null; });
document.addEventListener('touchmove', function(e) { if (!iconDrag || !iconDrag.isTouch) return; var touch=e.touches[0]; if (!touch) return; if (!iconDrag.moved && Math.abs(touch.clientX-iconDrag.startX)<8 && Math.abs(touch.clientY-iconDrag.startY)<8) return; iconDrag.moved=true; e.preventDefault(); var el=document.getElementById(iconDrag.id); if (el) { el.style.left=(touch.clientX-iconDrag.offsetX)+'px'; el.style.top=(touch.clientY-iconDrag.offsetY)+'px'; } }, { passive: false });
document.addEventListener('touchend', function() { if (!iconDrag || !iconDrag.isTouch) return; if (!iconDrag.moved) iconDrag.openFn(); iconDrag=null; });

document.addEventListener('mouseup', function() { if (dragState && !dragState.isTouch) dragState=null; });
function startDragTouch(e, wid) { if (e.target.closest('button')) return; bringToFront(wid); var touch=e.touches[0]; if (!touch) return; var el=document.getElementById(wid); var r=el.getBoundingClientRect(); dragState={windowId:wid,offsetX:touch.clientX-r.left,offsetY:touch.clientY-r.top,isTouch:true,startX:touch.clientX,startY:touch.clientY,moved:false}; }
document.addEventListener('touchmove', function(e) { if (!dragState || !dragState.isTouch) return; var touch=e.touches[0]; if (!touch) return; if (!dragState.moved && Math.abs(touch.clientX-dragState.startX)<8 && Math.abs(touch.clientY-dragState.startY)<8) return; dragState.moved=true; e.preventDefault(); var el=document.getElementById(dragState.windowId); if (el) { var nx=touch.clientX-dragState.offsetX,ny=touch.clientY-dragState.offsetY; ny=Math.max(-10,Math.min(ny,window.innerHeight-60)); nx=Math.max(-el.offsetWidth+60,Math.min(nx,window.innerWidth-60)); el.style.left=nx+'px'; el.style.top=ny+'px'; } }, { passive: false });
document.addEventListener('touchend', function() { if (dragState && dragState.isTouch) dragState=null; });
function updateTaskbar() { var c=document.getElementById('taskbarItems'); var html=''; for (var id in openWindows) { var w=openWindows[id]; var icon=w.type==='folder'?'📁':'🖼️'; html+='<button class="win-btn taskbar-item '+(id===activeWindowId?'active':'')+'" onclick="bringToFront(\''+id+'\')">'+icon+' '+w.name+'</button>'; } c.innerHTML=html; }
function toggleStart() { startOpen=!startOpen; document.getElementById('start-menu').classList.toggle('open',startOpen); if (!startOpen) { var ds=document.getElementById('docsSubmenu'); if (ds) ds.style.display='none'; } }
